<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Watch & Earn</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='11141415' data-sdk='show_11141415'></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0a0a0f; --surface:#13131e; --border:#1e1e30;
      --gold:#f5c842; --text:#f0f0f8; --muted:#6060a0;
      --green:#3dd68c; --red:#ff5a5a; --purple:#6c4ef2; --radius:18px;
    }
    body {
      font-family:'Space Grotesk',sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px; gap:16px;
    }

    .logo { font-size:56px; margin-bottom:4px; }
    .title { font-size:24px; font-weight:800; letter-spacing:-0.5px; }
    .subtitle { font-size:13px; color:var(--muted); text-align:center; line-height:1.6; }

    /* Balance */
    .balance-card {
      width:100%; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius);
      padding:20px; text-align:center;
    }
    .balance-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; }
    .balance-amount { font-size:42px; font-weight:800; color:var(--gold); letter-spacing:-1px; }
    .balance-unit { font-size:14px; color:var(--muted); margin-top:4px; }

    /* Stats */
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; }
    .stat {
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:14px; text-align:center;
    }
    .stat .val { font-size:20px; font-weight:800; color:var(--green); }
    .stat .lbl { font-size:11px; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:.6px; }

    /* Watch button */
    .watch-btn {
      width:100%; border:none; border-radius:16px;
      background:linear-gradient(135deg,var(--purple),#8b6af5);
      color:#fff; font-family:inherit; font-size:17px; font-weight:800;
      padding:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      transition:opacity .15s, transform .1s;
      box-shadow:0 8px 24px rgba(108,78,242,.35);
    }
    .watch-btn:active { transform:scale(0.97); opacity:.9; }
    .watch-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .watch-btn .ico { font-size:22px; }

    /* Cooldown */
    .cooldown {
      font-size:12px; color:var(--muted); text-align:center;
      min-height:18px;
    }
    .cooldown span { color:var(--gold); font-weight:700; }

    /* History */
    .history-card {
      width:100%; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius);
      padding:16px;
    }
    .history-title { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:12px; }
    .history-list { display:flex; flex-direction:column; gap:8px; max-height:140px; overflow-y:auto; }
    .history-item {
      display:flex; align-items:center; justify-content:space-between;
      font-size:13px; padding:6px 0; border-bottom:1px solid var(--border);
    }
    .history-item:last-child { border-bottom:none; }
    .history-item .left { color:var(--muted); }
    .history-item .right { color:var(--green); font-weight:700; }
    .empty-history { font-size:12px; color:var(--muted); text-align:center; padding:8px 0; }

    /* Toast */
    .toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(10px);
      background:#1a2a1a; border:1px solid var(--green); color:var(--green);
      padding:10px 20px; border-radius:30px; font-size:13px; font-weight:700;
      opacity:0; transition:all .25s; pointer-events:none; white-space:nowrap; z-index:200;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.error { background:#2a1a1a; border-color:var(--red); color:var(--red); }
  </style>
</head>
<body>

  <div class="logo">🎬</div>
  <div class="title">Watch & Earn</div>
  <div class="subtitle">Watch ads and earn coins.<br>Each ad = +1 coin.</div>

  <div class="balance-card">
    <div class="balance-label">Your Balance</div>
    <div class="balance-amount" id="balance">0</div>
    <div class="balance-unit">coins earned</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="val" id="ads-watched">0</div>
      <div class="lbl">Ads Watched</div>
    </div>
    <div class="stat">
      <div class="val" id="streak">0</div>
      <div class="lbl">Day Streak 🔥</div>
    </div>
  </div>

  <button class="watch-btn" id="watch-btn" onclick="watchAd()">
    <span class="ico">▶️</span> Watch Ad & Earn
  </button>

  <div class="cooldown" id="cooldown"></div>

  <div class="history-card">
    <div class="history-title">📋 Recent Activity</div>
    <div class="history-list" id="history-list">
      <div class="empty-history">No ads watched yet</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let balance = 0, adsWatched = 0, streak = 1;
    let cooldown = 0, cooldownTimer = null;

    function updateUI() {
      document.getElementById('balance').textContent = balance;
      document.getElementById('ads-watched').textContent = adsWatched;
      document.getElementById('streak').textContent = streak;
    }

    function watchAd() {
      const btn = document.getElementById('watch-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="ico">⏳</span> Loading ad...';

      show_11141415().then(() => {
        // ✅ Ad watched — reward user
        balance += 1;
        adsWatched++;
        addHistory();
        showToast('✅ +1 coin earned!');
        updateUI();

        // 10 second cooldown between ads
        startCooldown(10);
      }).catch(() => {
        showToast('No ad available, try again', true);
        btn.disabled = false;
        btn.innerHTML = '<span class="ico">▶️</span> Watch Ad & Earn';
      });
    }

    function startCooldown(seconds) {
      cooldown = seconds;
      const btn = document.getElementById('watch-btn');
      const cd  = document.getElementById('cooldown');

      clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        cooldown--;
        cd.innerHTML = 'Next ad in <span>' + cooldown + 's</span>';
        if (cooldown <= 0) {
          clearInterval(cooldownTimer);
          cd.textContent = '';
          btn.disabled = false;
          btn.innerHTML = '<span class="ico">▶️</span> Watch Ad & Earn';
        }
      }, 1000);
    }

    function addHistory() {
      const list = document.getElementById('history-list');
      const empty = list.querySelector('.empty-history');
      if (empty) empty.remove();

      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = '<span class="left">Ad #' + adsWatched + ' — ' + time + '</span><span class="right">+1 coin</span>';
      list.prepend(item);
    }

    function showToast(msg, isError=false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }

    updateUI();
  </script>
</body>
</html>
