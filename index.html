<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CoinHub - Earn Coins</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .coin-display {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .coin-count {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
        }
        .coin-label {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .reward-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            width: 100%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 16px;
        }
        .reward-btn:active {
            transform: scale(0.98);
        }
        .reward-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .feature-list {
            text-align: left;
            margin: 24px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 20px;
        }
        .feature-item {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feature-item:before {
            content: "✓";
            color: #4caf50;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ CoinHub</h1>
        <div class="subtitle">Watch ads and earn coins!</div>
        
        <div class="coin-display">
            <div class="coin-count" id="coinCount">0</div>
            <div class="coin-label">My Coins</div>
        </div>
        
        <button class="reward-btn" id="rewardBtn">🎬 Watch video & earn 5 coins</button>
        
        <div class="feature-list">
            <div class="feature-item">All main features are completely free</div>
            <div class="feature-item">Watch ads only to earn bonus coins</div>
            <div class="feature-item">No forced ads, you are in control</div>
        </div>
        <div class="footer">Ads by AdsGram</div>
    </div>

    <script>
        // CONFIGURATION - Your Block ID
        const BLOCK_ID = "34893";
        
        // Coin management
        let coinBalance = 0;
        const coinElement = document.getElementById('coinCount');
        const rewardBtn = document.getElementById('rewardBtn');
        let isAdLoading = false;
        
        function updateCoinDisplay() {
            coinElement.innerText = coinBalance;
            localStorage.setItem('coinBalance', coinBalance);
        }
        
        function addCoins(amount) {
            coinBalance += amount;
            updateCoinDisplay();
            if (window.Telegram && Telegram.WebView) {
                Telegram.WebView.showPopup({
                    title: '🎉 Congratulations!',
                    message: `You earned ${amount} coins!`,
                    buttons: [{type: 'ok'}]
                });
            } else {
                alert(`🎉 Congratulations! You earned ${amount} coins!`);
            }
        }
        
        // Load saved coins
        const savedBalance = localStorage.getItem('coinBalance');
        if (savedBalance !== null) {
            coinBalance = parseInt(savedBalance) || 0;
            updateCoinDisplay();
        }
        
        // Initialize AdsGram SDK
        let AdController = null;
        
        try {
            AdController = window.Adsgram.init({ 
                blockId: BLOCK_ID 
            });
            console.log("AdsGram initialized with blockId:", BLOCK_ID);
        } catch (error) {
            console.error("Failed to initialize AdsGram:", error);
        }
        
        // Show rewarded ad
        async function showRewardedAd() {
            if (!AdController) {
                alert("Ad service is not ready. Please try again.");
                return;
            }
            
            if (isAdLoading) {
                return;
            }
            
            isAdLoading = true;
            rewardBtn.disabled = true;
            
            const originalText = rewardBtn.innerHTML;
            rewardBtn.innerHTML = "⏳ Loading ad...";
            
            try {
                const result = await AdController.show();
                
                if (result && !result.error && result.done === true) {
                    addCoins(5);
                } else if (result && result.error) {
                    console.log("Ad error:", result.description);
                    alert("Failed to load ad. Please try again.");
                }
            } catch (error) {
                console.log("Ad show error:", error);
            } finally {
                isAdLoading = false;
                rewardBtn.disabled = false;
                rewardBtn.innerHTML = originalText;
            }
        }
        
        rewardBtn.addEventListener('click', showRewardedAd);
        
        console.log("Mini App ready! Block ID:", BLOCK_ID);
    </script>
</body>
</html>
