<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CoinHub - Earn Coins</title>
    <!-- مرحله 1: لود کردن SDK AdsGram در هدر - طبق مستندات -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .coin-display {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .coin-count {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
        }
        .coin-label {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .reward-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            width: 100%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 16px;
        }
        .reward-btn:active {
            transform: scale(0.98);
        }
        .reward-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .feature-list {
            text-align: left;
            margin: 24px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 20px;
        }
        .feature-item {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feature-item:before {
            content: "✓";
            color: #4caf50;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #aaa;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ CoinHub</h1>
        <div class="subtitle">Watch ads and earn coins!</div>
        
        <div class="coin-display">
            <div class="coin-count" id="coinCount">0</div>
            <div class="coin-label">My Coins</div>
        </div>
        
        <button class="reward-btn" id="rewardBtn">🎬 Watch video & earn 5 coins</button>
        
        <div class="feature-list">
            <div class="feature-item">All main features are completely free</div>
            <div class="feature-item">Watch ads only to earn bonus coins</div>
            <div class="feature-item">No forced ads, you are in control</div>
        </div>
        <div class="footer">Ads by AdsGram</div>
    </div>

    <script>
        // -------- تنظیمات --------
        const BLOCK_ID = "34886";  // Block ID شما
        
        // -------- مدیریت سکه --------
        let coinBalance = 0;
        const coinElement = document.getElementById('coinCount');
        const rewardBtn = document.getElementById('rewardBtn');
        let isAdLoading = false;
        
        function updateCoinDisplay() {
            coinElement.innerText = coinBalance;
            localStorage.setItem('coinBalance', coinBalance);
        }
        
        function addCoins(amount) {
            coinBalance += amount;
            updateCoinDisplay();
            // نمایش اعلان موفقیت
            if (window.Tel eg Telegram && Telegram.WebView) {
                Telegram.WebView.showPopup({
                    title: '🎉 Congratulations!',
                    message: `You earned ${amount} coins!`,
                    buttons: [{type: 'ok'}]
                });
            } else {
                alert(`🎉 Congratulations! You earned ${amount} coins!`);
            }
        }
        
        // بارگذاری سکه‌های ذخیره شده
        const savedBalance = localStorage.getItem('coinBalance');
        if (savedBalance !== null) {
            coinBalance = parseInt(savedBalance) || 0;
            updateCoinDisplay();
        }
        
        // -------- راه‌اندازی AdsGram طبق مستندات رسمی --------
        let AdController = null;
        
        try {
            // مرحله 2: راه‌اندازی (Initialize) AdsGram SDK با blockId
            AdController = window.Adsgram.init({ 
                blockId: BLOCK_ID 
            });
            console.log("AdsGram initialized successfully with blockId:", BLOCK_ID);
        } catch (error) {
            console.error("Failed to initialize AdsGram:", error);
        }
        
        // -------- تابع نمایش تبلیغ پاداشی (طبق مستندات) --------
        async function showRewardedAd() {
            // بررسی اینکه AdController آماده باشد
            if (!AdController) {
                alert("Ad service is not ready. Please try again.");
                return;
            }
            
            // جلوگیری از کلیک همزمان
            if (isAdLoading) {
                return;
            }
            
            isAdLoading = true;
            rewardBtn.disabled = true;
            
            // تغییر متن دکمه به حالت بارگذاری
            const originalText = rewardBtn.innerHTML;
            rewardBtn.innerHTML = "⏳ Loading ad...";
            
            try {
                // مرحله 3: نمایش تبلیغ با متد show() طبق مستندات
                // promise resolved when user watches ad till the end
                const result = await AdController.show();
                
                // بررسی نتیجه طبق مستندات
                // result دارای properties: done, description, state, error
                if (result && !result.error && result.done === true) {
                    // کاربر تبلیغ را تا انتها دید - جایزه بده
                    addCoins(5);
                } else if (result && result.error) {
                    // خطایی رخ داده
                    console.log("Ad error:", result.description);
                    alert("Failed to load ad. Please try again.");
                }
                // اگر result.error نبود ولی done هم false بود، یعنی کاربر تبلیغ را کامل ندید (در فرمت interstitial ممکن است)
                // در فرمت rewarded، only resolved when watched till the end
                
            } catch (error) {
                // کاربر خطا دریافت کرد (طبق مستندات، catch میشود)
                console.log("Ad show error:", error);
                // هیچ کاری نکن یا پیام بده
                if (error && error.description) {
                    console.log("Error description:", error.description);
                }
            } finally {
                // بازنشانی دکمه
                isAdLoading = false;
                rewardBtn.disabled = false;
                rewardBtn.innerHTML = originalText;
            }
        }
        
        // اتصال دکمه به تابع نمایش تبلیغ
        rewardBtn.addEventListener('click', showRewardedAd);
        
        console.log("Mini App is ready! Block ID:", BLOCK_ID);
    </script>
</body>
</html>
